# Configuration parameters for LaserScan Object Detector (optimized for YDLIDAR X4)
# Target platform: F1/10 scale vehicle / Jetson Orin Nano

/**:
  ros__parameters:
    # Sensor filters
    min_range: 0.15                  # YDLIDAR X4 blind zone is 0.12m, set to 0.15m to avoid chassis reflection
    max_range: 8.0                   # Max tracking range (X4 physically supports up to 10m)
    
    # Clustering (Dietmayer sequential JDC)
    beta_incidence_deg: 12.0         # Angle of incidence threshold (typically 10-15 deg)
    sigma_r: 0.02                    # Standard deviation of scan range measurements (approx 2cm for X4)
    min_jump_distance: 0.15          # Minimum clustering distance (in meters) between separate objects
    max_jump_distance: 1.0           # Maximum clustering distance threshold
    min_cluster_points: 4            # Ignore clusters with fewer than 4 points (noise filter)
    max_cluster_points: 2000         # Limit maximum cluster point count (raised to survive walls)
    
    # Preprocessing
    use_median_filter: true          # Skip if scan pre-filtered (laser_filters)
    
    # Shape Fitting & Post-processing
    use_convex_hull: true            # Output convex hulls for dynamic obstacles (ideal for MPC/CBF)
    split_threshold: 0.04            # Split distance (in meters) for split-and-merge wall line extraction
    circle_residual_ratio: 0.12      # Circle acceptance residual/radius ratio
    max_circle_radius: 1.0           # Max radius (meters) to accept as circle
    corner_angle_min_deg: 65.0       # Lower angle bound for L-shape corner fitting
    corner_angle_max_deg: 115.0      # Upper angle bound for L-shape corner fitting
    
    # Multi-Target Tracking
    tracking_frame: "odom"           # Frame for KF tracking + output (poses & velocities)
    tf_fallback_to_latest: true      # If the exact-stamp TF lookup fails (laggy/gappy localization), reuse the latest-available transform instead of dropping straight to the sensor frame. Lets RViz (Fixed Frame = tracking_frame) still render.
    tf_latest_max_delay: 2.0         # Max staleness (s) accepted for the latest-available TF fallback. Beyond this, fall back to the sensor frame. SAFETY: a stale ego pose on a fast-moving robot re-introduces small position error; keep low (or 0 to force exact-only) for high-speed use, raise for stationary/slow debugging of deficient bags.
    association_method: "hungarian"  # hungarian (recommended) or greedy
    publish_unconfirmed: true        # Publish tentative tracks as OBJECT_DETECTED
    max_association_distance: 0.8    # Gate distance (in meters) for tracking data association
    min_track_age: 3                 # Required consecutive observed frames before publishing track
    max_missed_frames: 5             # Number of missed updates before a track is deleted
    shape_smoothing_alpha: 0.5       # EMA smoothing coefficient on shape dimensions (1.0 = off)
    kf_process_noise: 0.1            # KF process noise (q). Lower = smoother, less phantom velocity on static objects; raise if fast dynamic obstacles lag. (was 0.5)
    shape_type_hysteresis: 3         # A track must see a differing shape type this many consecutive frames before switching (1 = off). Suppresses circle<->box<->line flicker; raise to 5 for near-zero flips.
    
    # Visualization & Debug
    publish_debug_pointcloud: true   # Publish unique color-coded cluster PointCloud2
    publish_debug_markers: true      # Publish cylinders, cubes, arrows, and ID labels in RViz2
